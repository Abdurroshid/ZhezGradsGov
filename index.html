<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Реестр аудита показателей</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16213E;
    --ink-soft:#233152;
    --paper:#F2F0EA;
    --paper-raised:#FFFFFF;
    --bone:#D8D3C7;
    --slate:#5B6472;
    --gold:#AD8A4D;
    --gold-deep:#8C6B33;
    --green:#2E6B52;
    --rust:#A8442E;
    --font-display:'Spectral', Georgia, serif;
    --font-body:'IBM Plex Sans', -apple-system, "Segoe UI", sans-serif;
    --font-mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:16px;
    line-height:1.5;
    min-height:100vh;
  }
  h1,h2{font-family:var(--font-display);font-weight:600;margin:0;}
  p{margin:0;}
  button,input{font-family:inherit;font-size:15px;}
  *:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
  }

  /* ---------- shared ---------- */
  .btn-primary{
    background:var(--ink);color:#fff;border:none;border-radius:2px;
    padding:12px 20px;font-weight:600;cursor:pointer;min-height:44px;
    transition:background 180ms ease;
  }
  .btn-primary:hover{background:var(--ink-soft);}
  .btn-full{width:100%;}
  .btn-small{padding:8px 14px;min-height:36px;font-size:14px;}
  .btn-secondary{
    background:var(--paper-raised);color:var(--ink);border:1px solid var(--bone);
    border-radius:2px;padding:10px 16px;font-weight:600;cursor:pointer;min-height:44px;
  }
  .btn-secondary:hover{border-color:var(--gold);}
  .btn-ghost{
    background:transparent;border:1px solid var(--bone);color:var(--ink);
    border-radius:2px;padding:9px 16px;cursor:pointer;min-height:40px;font-weight:500;
  }
  .btn-ghost:hover{background:var(--paper);}
  .btn-ghost-light{border-color:rgba(255,255,255,0.3);color:#fff;}
  .btn-ghost-light:hover{background:rgba(255,255,255,0.08);}
  .btn-icon{
    background:transparent;border:none;color:var(--slate);cursor:pointer;
    padding:8px;border-radius:2px;display:inline-flex;min-width:36px;min-height:36px;
    align-items:center;justify-content:center;
  }
  .btn-icon:hover{color:var(--rust);background:rgba(168,68,46,0.08);}
  label{display:block;font-size:13px;font-weight:600;color:var(--slate);margin:14px 0 6px;}
  input[type="text"],input[type="email"],input[type="password"],input[type="number"]{
    width:100%;padding:11px 12px;border:1px solid var(--bone);border-radius:2px;
    background:#fff;color:var(--ink);min-height:44px;
  }
  input::placeholder{color:#9aa0aa;}
  .form-error{
    margin-top:14px;padding:10px 12px;background:rgba(168,68,46,0.08);
    border-left:3px solid var(--rust);color:var(--rust);font-size:14px;border-radius:2px;
  }
  .demo-note{
    max-width:960px;margin:0 auto;padding:18px 24px 32px;color:var(--slate);
    font-size:12.5px;line-height:1.5;
  }
  .loading{padding:60px;text-align:center;color:var(--slate);font-family:var(--font-mono);}

  /* ---------- auth screen ---------- */
  .auth-shell{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;}
  .auth-side{
    background:var(--ink);color:#fff;display:flex;align-items:center;
    padding:48px;position:relative;overflow:hidden;
  }
  .auth-side-inner{max-width:420px;}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:18px;}
  .auth-side h1{font-size:34px;line-height:1.2;margin-bottom:18px;}
  .auth-side p{color:#C7CCDA;font-size:15px;}
  .stamp-seal{margin-top:40px;opacity:0.9;}
  .auth-card-wrap{display:flex;align-items:center;justify-content:center;padding:32px;}
  .auth-card{width:100%;max-width:380px;background:var(--paper-raised);border:1px solid var(--bone);border-radius:3px;padding:32px;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--bone);margin-bottom:8px;}
  .auth-tab{
    flex:1;background:none;border:none;padding:10px 0;font-weight:600;color:var(--slate);
    cursor:pointer;border-bottom:2px solid transparent;min-height:44px;
  }
  .auth-tab.active{color:var(--ink);border-bottom-color:var(--gold);}
  @media (max-width:760px){
    .auth-shell{grid-template-columns:1fr;}
    .auth-side{padding:36px 28px;}
    .stamp-seal{display:none;}
  }

  /* ---------- shell / topbar ---------- */
  .shell{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{
    background:var(--paper-raised);border-bottom:1px solid var(--bone);
    padding:18px 28px;display:flex;justify-content:space-between;align-items:center;
  }
  .topbar-ink{background:var(--ink);color:#fff;border-bottom:none;}
  .org-name{font-family:var(--font-display);font-size:19px;font-weight:600;}
  .org-meta{font-family:var(--font-mono);font-size:12.5px;color:var(--slate);margin-top:2px;}
  .admin-title{font-family:var(--font-display);font-size:19px;font-weight:600;}
  .admin-meta{font-family:var(--font-mono);font-size:12.5px;color:#A9B0C2;margin-top:2px;}

  /* ---------- org ledger ---------- */
  .ledger-sheet{max-width:760px;width:100%;margin:0 auto;padding:36px 28px;flex:1;}
  .sheet-head{margin-bottom:24px;}
  .sheet-head h1{font-size:24px;margin-bottom:8px;}
  .sheet-head p{color:var(--slate);font-size:14.5px;}
  .ledger-row{
    display:grid;grid-template-columns:1fr 160px 44px;gap:16px;align-items:center;
    padding:14px 0;border-bottom:1px solid var(--bone);
  }
  .ledger-label label{font-size:15px;font-weight:500;color:var(--ink);margin:0;display:block;}
  .ledger-unit{font-family:var(--font-mono);font-size:12px;color:var(--slate);}
  .ledger-input{font-family:var(--font-mono);text-align:right;}
  .stamp{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .stamp-filled{background:var(--green);color:#fff;}
  .stamp-pending{border:1.5px dashed var(--bone);color:transparent;}
  @media (max-width:600px){
    .ledger-row{grid-template-columns:1fr;gap:8px;}
    .stamp{justify-self:end;margin-top:-36px;}
  }
  .sheet-footer{
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    margin-top:20px;flex-wrap:wrap;
  }
  .updated-note{font-family:var(--font-mono);font-size:12.5px;color:var(--slate);}

  /* ---------- admin ---------- */
  .admin-main{flex:1;padding:28px;max-width:1200px;width:100%;margin:0 auto;}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .search-input{max-width:320px;}
  .add-indicator-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .add-indicator-form input{width:200px;min-height:40px;padding:9px 10px;}
  .table-wrap{overflow-x:auto;background:var(--paper-raised);border:1px solid var(--bone);border-radius:3px;}
  table.registry-table{border-collapse:collapse;width:100%;min-width:640px;}
  .registry-table th,.registry-table td{
    padding:13px 16px;text-align:left;border-bottom:1px solid var(--bone);font-size:14px;white-space:nowrap;
  }
  .registry-table thead th{
    font-size:11.5px;letter-spacing:0.5px;text-transform:uppercase;color:var(--slate);
    font-weight:600;background:var(--paper);
  }
  .th-unit{display:block;font-family:var(--font-mono);font-size:10px;text-transform:none;letter-spacing:0;color:#9aa0aa;}
  .cell-num{font-family:var(--font-mono);text-align:right;}
  .cell-empty{color:#B7BCC4;}
  .row-org{font-weight:600;}
  .row-bin{font-family:var(--font-mono);font-size:11.5px;color:var(--slate);}
  .row-updated{font-family:var(--font-mono);font-size:12px;color:var(--slate);}
  .progress-track{width:90px;height:6px;background:var(--bone);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);}
  .progress-label{font-family:var(--font-mono);font-size:11px;color:var(--slate);margin-top:4px;}
  .empty-state{text-align:center;color:var(--slate);padding:40px 16px;font-style:italic;}
</style>
</head>
<body>
<div id="app"><div class="loading">Загрузка реестра…</div></div>

<script>
  // ---------- constants ----------
  const ADMIN_EMAIL = 'admin@audit.gov.kz';
  const ADMIN_PASSWORD = 'admin2026';

  const DEFAULT_INDICATORS = [
    {id:'staff', name:'Среднесписочная численность сотрудников', unit:'чел.'},
    {id:'revenue', name:'Выручка за отчётный период', unit:'тыс. ₸'},
    {id:'taxes', name:'Уплаченные налоги и отчисления', unit:'тыс. ₸'},
    {id:'payables', name:'Кредиторская задолженность', unit:'тыс. ₸'},
    {id:'receivables', name:'Дебиторская задолженность', unit:'тыс. ₸'}
  ];

  const CHECK_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"></polyline></svg>';
  const TRASH_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';
  const STAMP_SVG = '<svg class="stamp-seal" viewBox="0 0 160 160" width="140" height="140" aria-hidden="true">' +
    '<circle cx="80" cy="80" r="70" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="2 4"/>' +
    '<circle cx="80" cy="80" r="56" fill="none" stroke="var(--gold)" stroke-width="2"/>' +
    '<text x="80" y="76" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="2" fill="var(--gold)">АУДИТ</text>' +
    '<text x="80" y="94" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" letter-spacing="3" fill="var(--gold)">РЕЕСТР</text>' +
    '</svg>';

  // ---------- storage (with in-memory fallback) ----------
  const storageAvailable = typeof window.storage !== 'undefined' && window.storage !== null;
  const memoryFallback = {};

  async function getStore(key, fallback){
    if(!storageAvailable) return memoryFallback[key] !== undefined ? memoryFallback[key] : fallback;
    try{
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : fallback;
    }catch(e){ return fallback; }
  }
  async function setStore(key, value){
    memoryFallback[key] = value;
    if(!storageAvailable) return;
    try{ await window.storage.set(key, JSON.stringify(value), true); }
    catch(e){ console.error('storage error', e); }
  }

  // ---------- state ----------
  let orgs = {};
  let indicators = [];
  let submissions = {};
  let currentUser = null;     // {role:'org'|'admin', email, orgName, bin}
  let authTab = 'login';
  let authError = null;
  let adminAddingIndicator = false;
  let adminSearch = '';

  const app = document.getElementById('app');

  // ---------- helpers ----------
  function escapeHtml(str){
    if(str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(ts){
    if(!ts) return '—';
    return new Date(ts).toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }

  // ---------- init ----------
  async function init(){
    orgs = await getStore('audit_orgs', {});
    let storedIndicators = await getStore('audit_indicators', null);
    if(!storedIndicators){
      indicators = DEFAULT_INDICATORS.slice();
      await setStore('audit_indicators', indicators);
    } else {
      indicators = storedIndicators;
    }
    submissions = await getStore('audit_submissions', {});
    render();
  }

  function render(){
    if(!currentUser) return renderAuth();
    if(currentUser.role === 'admin') return renderAdminDashboard();
    return renderOrgDashboard();
  }

  // ---------- auth screen ----------
  function loginFormHtml(){
    return '<form onsubmit="handleLoginSubmit(event)">' +
      '<label for="login-email">Email</label>' +
      '<input id="login-email" name="email" type="email" required autocomplete="username" />' +
      '<label for="login-password">Пароль</label>' +
      '<input id="login-password" name="password" type="password" required autocomplete="current-password" />' +
      '<button type="submit" class="btn-primary btn-full" style="margin-top:20px;">Войти</button>' +
      '</form>';
  }
  function registerFormHtml(){
    return '<form onsubmit="handleRegisterSubmit(event)">' +
      '<label for="reg-org">Название организации</label>' +
      '<input id="reg-org" name="orgName" required />' +
      '<label for="reg-bin">БИН / ИИН (необязательно)</label>' +
      '<input id="reg-bin" name="bin" maxlength="12" placeholder="12 цифр" />' +
      '<label for="reg-email">Email</label>' +
      '<input id="reg-email" name="email" type="email" required autocomplete="username" />' +
      '<label for="reg-password">Пароль</label>' +
      '<input id="reg-password" name="password" type="password" minlength="6" required autocomplete="new-password" />' +
      '<button type="submit" class="btn-primary btn-full" style="margin-top:20px;">Создать профиль</button>' +
      '</form>';
  }

  function renderAuth(){
    app.innerHTML =
      '<div class="auth-shell">' +
        '<div class="auth-side">' +
          '<div class="auth-side-inner">' +
            '<div class="eyebrow">РЕСПУБЛИКАНСКИЙ РЕЕСТР</div>' +
            '<h1>Портал сбора аудиторских показателей</h1>' +
            '<p>Каждая организация видит и заполняет только свой профиль. Сводный реестр доступен только аудитору.</p>' +
            STAMP_SVG +
          '</div>' +
        '</div>' +
        '<div class="auth-card-wrap">' +
          '<div class="auth-card">' +
            '<div class="auth-tabs">' +
              '<button class="auth-tab ' + (authTab==='login'?'active':'') + '" onclick="switchAuthTab(\'login\')">Вход</button>' +
              '<button class="auth-tab ' + (authTab==='register'?'active':'') + '" onclick="switchAuthTab(\'register\')">Регистрация</button>' +
            '</div>' +
            (authTab === 'login' ? loginFormHtml() : registerFormHtml()) +
            (authError ? '<div class="form-error">' + escapeHtml(authError) + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function switchAuthTab(tab){ authTab = tab; authError = null; render(); }

  async function handleLoginSubmit(e){
    e.preventDefault();
    const f = e.target;
    const email = f.email.value.trim().toLowerCase();
    const password = f.password.value;

    if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD){
      currentUser = {role:'admin'};
      authError = null;
      render();
      return;
    }
    const org = orgs[email];
    if(org && org.password === password){
      currentUser = {role:'org', email, orgName:org.orgName, bin:org.bin};
      authError = null;
      render();
      return;
    }
    authError = 'Неверный email или пароль.';
    render();
  }

  async function handleRegisterSubmit(e){
    e.preventDefault();
    const f = e.target;
    const orgName = f.orgName.value.trim();
    const bin = f.bin.value.trim();
    const email = f.email.value.trim().toLowerCase();
    const password = f.password.value;

    if(email === ADMIN_EMAIL || orgs[email]){
      authError = 'Организация с таким email уже зарегистрирована.';
      render();
      return;
    }
    orgs[email] = {orgName, bin, email, password, createdAt: Date.now()};
    submissions[email] = submissions[email] || {values:{}, updatedAt:null};
    await setStore('audit_orgs', orgs);
    await setStore('audit_submissions', submissions);

    currentUser = {role:'org', email, orgName, bin};
    authError = null;
    render();
  }

  function handleLogout(){
    currentUser = null;
    authError = null;
    adminAddingIndicator = false;
    adminSearch = '';
    render();
  }

  // ---------- org dashboard ----------
  function renderOrgDashboard(){
    const sub = submissions[currentUser.email] || {values:{}, updatedAt:null};
    const rows = indicators.map(ind => {
      const val = sub.values[ind.id];
      const filled = val !== undefined && val !== null && String(val).trim() !== '';
      return (
        '<div class="ledger-row">' +
          '<div class="ledger-label">' +
            '<label for="ind-' + ind.id + '">' + escapeHtml(ind.name) + '</label>' +
            '<span class="ledger-unit">' + escapeHtml(ind.unit) + '</span>' +
          '</div>' +
          '<input class="ledger-input" type="number" step="0.01" min="0" id="ind-' + ind.id + '" name="' + ind.id + '" value="' + (filled ? escapeHtml(val) : '') + '" placeholder="0" />' +
          '<div class="stamp ' + (filled ? 'stamp-filled' : 'stamp-pending') + '" title="' + (filled ? 'Заполнено' : 'Не заполнено') + '">' +
            (filled ? CHECK_SVG : '') +
          '</div>' +
        '</div>'
      );
    }).join('');

    app.innerHTML =
      '<div class="shell">' +
        '<header class="topbar">' +
          '<div>' +
            '<div class="org-name">' + escapeHtml(currentUser.orgName) + '</div>' +
            '<div class="org-meta">' + (currentUser.bin ? 'БИН ' + escapeHtml(currentUser.bin) : 'Профиль организации') + '</div>' +
          '</div>' +
          '<button class="btn-ghost" onclick="handleLogout()">Выйти</button>' +
        '</header>' +
        '<main class="ledger-sheet">' +
          '<div class="sheet-head">' +
            '<h1>Показатели для отчёта</h1>' +
            '<p>Заполните и сохраните данные. Эти данные видит только администратор реестра — другие организации их не видят.</p>' +
          '</div>' +
          '<form id="submission-form" onsubmit="handleSaveSubmission(event)">' +
            rows +
            '<div class="sheet-footer">' +
              '<span class="updated-note">' + (sub.updatedAt ? 'Обновлено: ' + formatDate(sub.updatedAt) : 'Пока не сохранено') + '</span>' +
              '<button type="submit" class="btn-primary">Сохранить данные</button>' +
            '</div>' +
          '</form>' +
        '</main>' +
        '<footer class="demo-note">Демо-режим: это рабочий прототип фронтенда. Данные хранятся в общем хранилище прототипа без серверной проверки доступа — для реального запуска нужен backend (например Node.js + PostgreSQL) с авторизацией на сервере.</footer>' +
      '</div>';
  }

  async function handleSaveSubmission(e){
    e.preventDefault();
    const form = e.target;
    const values = {};
    indicators.forEach(ind => { values[ind.id] = form.elements[ind.id].value; });
    submissions[currentUser.email] = {values, updatedAt: Date.now()};
    await setStore('audit_submissions', submissions);
    renderOrgDashboard();
  }

  // ---------- admin dashboard ----------
  function getFilteredOrgs(){
    const q = adminSearch.trim().toLowerCase();
    return Object.values(orgs).filter(o => {
      if(!q) return true;
      return o.orgName.toLowerCase().includes(q) || (o.bin || '').toLowerCase().includes(q);
    }).sort((a,b) => a.orgName.localeCompare(b.orgName, 'ru'));
  }

  function buildRegistryRowsHtml(filtered){
    if(!filtered.length){
      return '<tr><td colspan="' + (indicators.length + 4) + '" class="empty-state">Реестр пуст. Ожидаем заявки от организаций.</td></tr>';
    }
    return filtered.map(o => {
      const sub = submissions[o.email] || {values:{}, updatedAt:null};
      const filledCount = indicators.filter(ind => {
        const v = sub.values[ind.id];
        return v !== undefined && v !== null && String(v).trim() !== '';
      }).length;
      const pct = indicators.length ? Math.round(filledCount / indicators.length * 100) : 0;
      const cells = indicators.map(ind => {
        const v = sub.values[ind.id];
        const has = v !== undefined && v !== null && String(v).trim() !== '';
        return '<td class="cell-num">' + (has ? escapeHtml(v) : '<span class="cell-empty">—</span>') + '</td>';
      }).join('');
      return (
        '<tr>' +
          '<td>' +
            '<div class="row-org">' + escapeHtml(o.orgName) + '</div>' +
            '<div class="row-bin">' + (o.bin ? 'БИН ' + escapeHtml(o.bin) : '') + '</div>' +
          '</td>' +
          cells +
          '<td>' +
            '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
            '<div class="progress-label">' + filledCount + '/' + indicators.length + '</div>' +
          '</td>' +
          '<td class="row-updated">' + formatDate(sub.updatedAt) + '</td>' +
          '<td><button class="btn-icon" title="Удалить организацию" onclick="handleDeleteOrg(\'' + o.email + '\')">' + TRASH_SVG + '</button></td>' +
        '</tr>'
      );
    }).join('');
  }

  function renderAdminDashboard(){
    const cols = indicators.map(ind =>
      '<th>' + escapeHtml(ind.name) + '<span class="th-unit">' + escapeHtml(ind.unit) + '</span></th>'
    ).join('');

    const addForm = adminAddingIndicator
      ? '<form class="add-indicator-form" onsubmit="handleAddIndicator(event)">' +
          '<input name="name" placeholder="Название показателя" required />' +
          '<input name="unit" placeholder="Ед. изм." required style="width:110px" />' +
          '<button type="submit" class="btn-primary btn-small">Добавить</button>' +
          '<button type="button" class="btn-ghost btn-small" onclick="toggleAddIndicator(false)">Отмена</button>' +
        '</form>'
      : '<button class="btn-secondary" onclick="toggleAddIndicator(true)">+ Добавить показатель</button>';

    app.innerHTML =
      '<div class="shell shell-admin">' +
        '<header class="topbar topbar-ink">' +
          '<div>' +
            '<div class="admin-title">Панель аудита</div>' +
            '<div class="admin-meta">' + Object.keys(orgs).length + ' организаций в реестре</div>' +
          '</div>' +
          '<button class="btn-ghost btn-ghost-light" onclick="handleLogout()">Выйти</button>' +
        '</header>' +
        '<main class="admin-main">' +
          '<div class="toolbar">' +
            '<input class="search-input" placeholder="Поиск по названию или БИН" value="' + escapeHtml(adminSearch) + '" oninput="handleSearchInput(event)" />' +
            addForm +
          '</div>' +
          '<div class="table-wrap">' +
            '<table class="registry-table">' +
              '<thead><tr><th>Организация</th>' + cols + '<th>Заполнено</th><th>Обновлено</th><th></th></tr></thead>' +
              '<tbody id="registry-tbody">' + buildRegistryRowsHtml(getFilteredOrgs()) + '</tbody>' +
            '</table>' +
          '</div>' +
        '</main>' +
        '<footer class="demo-note">Демо-режим: проверка ролей выполняется на клиенте, а не на сервере. Для реального запуска нужен backend с серверной авторизацией и базой данных.</footer>' +
      '</div>';
  }

  function handleSearchInput(e){
    adminSearch = e.target.value;
    const tbody = document.getElementById('registry-tbody');
    if(tbody) tbody.innerHTML = buildRegistryRowsHtml(getFilteredOrgs());
  }

  function toggleAddIndicator(state){ adminAddingIndicator = state; render(); }

  async function handleAddIndicator(e){
    e.preventDefault();
    const f = e.target;
    const name = f.name.value.trim();
    const unit = f.unit.value.trim();
    if(!name) return;
    indicators.push({id: 'ind_' + Date.now(), name, unit: unit || '—'});
    await setStore('audit_indicators', indicators);
    adminAddingIndicator = false;
    render();
  }

  async function handleDeleteOrg(email){
    if(!confirm('Удалить организацию из реестра? Это действие нельзя отменить.')) return;
    delete orgs[email];
    delete submissions[email];
    await setStore('audit_orgs', orgs);
    await setStore('audit_submissions', submissions);
    render();
  }

  init();
</script>
</body>
</html>
